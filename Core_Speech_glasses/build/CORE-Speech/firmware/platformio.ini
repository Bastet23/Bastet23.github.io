; ESP32-S2 firmware (Arduino framework)
;
; Library dependency:
; - WebSockets by Markus Sattler (Links2004): provides WebSocketsClient.h
;
; Install via:
; - PlatformIO: this lib_deps entry
; - Arduino Library Manager: search "WebSockets" by Markus Sattler

[env:esp32-s2-devkit-lipo]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino

monitor_speed = 115200

build_flags =
  -DCORE_DEBUG_LEVEL=0

lib_deps =
  links2004/WebSockets@^2.6.1
  marcoschwartz/LiquidCrystal_I2C@^1.1.4

